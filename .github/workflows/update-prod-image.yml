name: Update Prod Image

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-prod-image:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Use the GitHub Release tag, not git describe on HEAD:
      # - checkout may not see the new tag yet, or describe can pick the previous ancestor tag.
      # - This job runs after Release succeeds, so releases/latest is the tag just published.
      - name: Get release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq -r .tag_name)
          if [ -z "$TAG" ] || [ "$TAG" = "null" ] || [[ "$TAG" != v* ]]; then
            echo "No tag from releases/latest — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update values-prod.yaml
        if: steps.tag.outputs.skip == 'false'
        run: python scripts/update_prod_image.py "${{ steps.tag.outputs.version }}"

      - name: Commit and push
        if: steps.tag.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/treadstone/values-prod.yaml deploy/treadstone-web/values-prod.yaml
          git diff --cached --quiet \
            || git commit -m "chore: update prod image to ${{ steps.tag.outputs.version }}"
          git push
