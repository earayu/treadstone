name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Lint check
        run: make lint-py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Run tests
        run: uv run pytest tests/ -v --cov=treadstone --cov-report=term-missing
        env:
          TREADSTONE_DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake?sslmode=require"

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Apply database migrations
        run: make migrate
        env:
          TREADSTONE_DATABASE_URL: ${{ secrets.TREADSTONE_DATABASE_URL }}
      - name: Run integration tests
        run: make test-integration
        env:
          TREADSTONE_DATABASE_URL: ${{ secrets.TREADSTONE_DATABASE_URL }}

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Verify OpenAPI spec generation
        run: make gen-openapi
        env:
          TREADSTONE_DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake?sslmode=require"
          TREADSTONE_JWT_SECRET: "ci-jwt-secret-for-openapi-export-1234"

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t treadstone-api:ci .

  web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: make install-web
      - name: Lint
        run: make lint-web
      - name: Type-check and build
        run: make build-web
