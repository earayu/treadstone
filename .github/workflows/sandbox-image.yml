name: Build Sandbox Image

on:
  push:
    tags:
      - "sandbox-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version with v prefix, e.g. v0.1.0"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/treadstone-sandbox

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              echo "workflow_dispatch releases must be triggered from the main branch, got: ${GITHUB_REF_NAME}"
              exit 1
            fi
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#sandbox-}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like v0.1.0, got: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure version is not already published
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          if docker manifest inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "Image tag already exists and must not be republished: $IMAGE_REF"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: deploy/sandbox-image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TREADSTONE_SANDBOX_VERSION=${{ steps.version.outputs.version }}
