name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  TREADSTONE_IMAGE: ghcr.io/${{ github.repository_owner }}/treadstone

permissions:
  contents: write
  packages: write

jobs:
  # ── Gate: lint + test must pass before any publishing ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v
        env:
          TREADSTONE_DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake?sslmode=require"

  # ── Docker image → GHCR ──
  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.TREADSTONE_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── CLI (treadstone) → PyPI ──
  publish-cli:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - run: uv build
      - run: uv publish --token "$PYPI_API_TOKEN"
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ── SDK (treadstone-sdk) → PyPI ──
  publish-sdk:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: pip install poetry-core

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" sdk/python/pyproject.toml

      - name: Build SDK
        working-directory: sdk/python
        run: uv build

      - name: Publish SDK
        working-directory: sdk/python
        run: uv publish --token "$PYPI_API_TOKEN"
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ── CLI binaries → GitHub Release assets ──
  build-binaries:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: treadstone-linux-amd64
          - os: macos-latest
            artifact_name: treadstone-darwin-arm64
          - os: macos-13
            artifact_name: treadstone-darwin-amd64
          - os: windows-latest
            artifact_name: treadstone-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Set version from tag
        shell: python
        run: |
          import re, pathlib, os
          ver = os.environ["GITHUB_REF_NAME"].lstrip("v")
          p = pathlib.Path("pyproject.toml")
          p.write_text(re.sub(r"(?m)^version = .*", f'version = "{ver}"', p.read_text()))

      - name: Install dependencies + PyInstaller
        run: uv sync --frozen && uv pip install pyinstaller

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name treadstone \
            --exclude-module sqlalchemy \
            --exclude-module asyncpg \
            --exclude-module fastapi \
            --exclude-module uvicorn \
            --exclude-module alembic \
            treadstone/cli/__main__.py

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/treadstone.exe "dist/${{ matrix.artifact_name }}"
          else
            mv dist/treadstone "dist/${{ matrix.artifact_name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  # ── GitHub Release ──
  github-release:
    needs: [docker, publish-cli, publish-sdk, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            LOG=$(git log --oneline --no-decorate -20)
          else
            LOG=$(git log --oneline --no-decorate "$PREV_TAG".."$GITHUB_REF_NAME")
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG" | sed 's/^/- /'
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "# Standalone binary (no Python required)"
            echo "# macOS (Apple Silicon)"
            echo "curl -L https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-darwin-arm64 -o treadstone && chmod +x treadstone"
            echo ""
            echo "# macOS (Intel)"
            echo "curl -L https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-darwin-amd64 -o treadstone && chmod +x treadstone"
            echo ""
            echo "# Linux"
            echo "curl -L https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-linux-amd64 -o treadstone && chmod +x treadstone"
            echo ""
            echo "# Python / pip"
            echo "pip install treadstone==$VERSION"
            echo ""
            echo "# SDK"
            echo "pip install treadstone-sdk==$VERSION"
            echo ""
            echo "# Docker"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/treadstone:$VERSION"
            echo '```'
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: artifacts/*
