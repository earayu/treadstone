name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver without v), e.g. 0.8.3 — matches image tags"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  TREADSTONE_IMAGE: ghcr.io/${{ github.repository_owner }}/treadstone
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/treadstone-web
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_TAG: v${{ inputs.version }}

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # ── Bump version files, prod Helm values, commit to main, tag, push ──
  bump-and-tag:
    runs-on: ubuntu-latest
    outputs:
      major_minor: ${{ steps.version_parts.outputs.major_minor }}
    steps:
      - name: Validate version format
        run: |
          V="${{ inputs.version }}"
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be semver x.y.z (no v prefix), got: $V"
            exit 1
          fi

      - id: version_parts
        run: |
          V="${{ inputs.version }}"
          echo "major_minor=$(echo "$V" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main
        run: git pull origin main --rebase

      - name: Ensure tag does not exist
        run: |
          git fetch origin --tags
          if git rev-parse "refs/tags/${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.RELEASE_TAG }} already exists."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen

      - name: Apply version and prod image tags
        run: |
          uv run python scripts/set_release_versions.py "${{ inputs.version }}"
          uv lock
          uv run python scripts/update_prod_image.py "${{ env.RELEASE_TAG }}"

      - name: Commit, push main, tag, push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            pyproject.toml \
            cli/pyproject.toml \
            sdk/python/pyproject.toml \
            web/package.json \
            web/src/lib/app-version.ts \
            uv.lock \
            deploy/treadstone/values-prod.yaml \
            deploy/treadstone-web/values-prod.yaml
          git commit -m "chore: release ${{ inputs.version }} [skip ci]"
          git push origin HEAD:main
          git tag "${{ env.RELEASE_TAG }}"
          git push origin "${{ env.RELEASE_TAG }}"

  # ── Gate: lint + test must pass before any publishing ──
  lint:
    needs: [bump-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: make lint-py

  test:
    needs: [bump-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v
        env:
          TREADSTONE_DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake?sslmode=require"

  # ── Docker image → GHCR ──
  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Set versions from release
        run: python scripts/set_release_versions.py "${{ env.RELEASE_TAG }}"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.TREADSTONE_IMAGE }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=${{ needs.bump-and-tag.outputs.major_minor }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Web frontend Docker image → GHCR ──
  docker-web:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=${{ needs.bump-and-tag.outputs.major_minor }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── CLI (treadstone-cli) → PyPI ──
  publish-cli:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6

      - name: Set versions from release
        run: python scripts/set_release_versions.py "${{ env.RELEASE_TAG }}"

      - name: Build CLI
        working-directory: cli
        run: uv build

      - name: Publish to PyPI
        working-directory: cli
        run: |
          uv publish --token "$PYPI_API_TOKEN" 2>&1 | tee /tmp/publish.log || {
            if grep -q "File already exists" /tmp/publish.log; then
              echo "::warning::Version already exists on PyPI — skipping (idempotent)"
            else
              exit 1
            fi
          }
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ── SDK (treadstone-sdk) → PyPI ──
  publish-sdk:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
      - run: pip install poetry-core

      - name: Set versions from release
        run: python scripts/set_release_versions.py "${{ env.RELEASE_TAG }}"

      - name: Build SDK
        working-directory: sdk/python
        run: uv build

      - name: Publish SDK
        working-directory: sdk/python
        run: |
          uv publish --token "$PYPI_API_TOKEN" 2>&1 | tee /tmp/publish-sdk.log || {
            if grep -q "File already exists" /tmp/publish-sdk.log; then
              echo "::warning::SDK version already exists on PyPI — skipping (idempotent)"
            else
              exit 1
            fi
          }
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ── CLI Linux binary (manylinux_2_28 container → glibc ≥ 2.28 compatibility) ──
  build-linux-binary:
    needs: [lint, test]
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Install git
        run: yum install -y git

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Set versions from release
        run: python3 scripts/set_release_versions.py "${{ env.RELEASE_TAG }}"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install CLI dependencies + PyInstaller
        working-directory: cli
        run: |
          uv python install 3.12
          uv sync --frozen
          uv pip install pyinstaller

      - name: Build binary
        working-directory: cli
        run: |
          uv run pyinstaller \
            --onefile \
            --name treadstone \
            --copy-metadata treadstone-cli \
            treadstone_cli/__main__.py

      - name: Rename binary
        run: mv cli/dist/treadstone cli/dist/treadstone-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: treadstone-linux-amd64
          path: cli/dist/treadstone-linux-amd64

  # ── CLI macOS / Windows binaries → GitHub Release assets ──
  build-binaries:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: treadstone-darwin-arm64
          - os: macos-15-intel
            artifact_name: treadstone-darwin-amd64
          - os: windows-latest
            artifact_name: treadstone-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6

      - name: Set versions from release
        run: python scripts/set_release_versions.py "${{ env.RELEASE_TAG }}"

      - name: Install CLI dependencies + PyInstaller
        working-directory: cli
        run: uv sync --frozen && uv pip install pyinstaller

      - name: Build binary
        shell: bash
        working-directory: cli
        run: |
          uv run pyinstaller \
            --onefile \
            --name treadstone \
            --copy-metadata treadstone-cli \
            treadstone_cli/__main__.py

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv cli/dist/treadstone.exe "cli/dist/${{ matrix.artifact_name }}"
          else
            mv cli/dist/treadstone "cli/dist/${{ matrix.artifact_name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: cli/dist/${{ matrix.artifact_name }}

  # ── GitHub Release ──
  github-release:
    needs: [docker, docker-web, publish-cli, publish-sdk, build-linux-binary, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: treadstone-*
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Add install scripts
        run: |
          cp scripts/install.sh  artifacts/install.sh
          cp scripts/install.ps1 artifacts/install.ps1

      - name: Generate changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$RELEASE_TAG" ]; then
            LOG=$(git log --oneline --no-decorate -20)
          else
            LOG=$(git log --oneline --no-decorate "$PREV_TAG".."$RELEASE_TAG")
          fi
          VERSION="$RELEASE_VERSION"
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG" | sed 's/^/- /'
            echo ""
            echo "## Install"
            echo ""
            echo "Use the release installer script if you want the simplest path."
            echo "It selects the right binary for your platform and verifies checksums when available."
            echo ""
            echo "**macOS / Linux**"
            echo '```bash'
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$VERSION/install.sh | sh"
            echo '```'
            echo ""
            echo "**Windows PowerShell**"
            echo '```powershell'
            echo "irm https://github.com/${{ github.repository }}/releases/download/v$VERSION/install.ps1 | iex"
            echo '```'
            echo ""
            echo "**Alternative: PyPI**"
            echo '```bash'
            echo "pip install treadstone-cli==$VERSION"
            echo '```'
            echo ""
            echo "**Docker image**"
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository_owner }}/treadstone:$VERSION"
            echo '```'
            echo ""
            echo "**Manual binary download**"
            echo '```bash'
            echo "# macOS (Apple Silicon)"
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-darwin-arm64 -o treadstone && chmod +x treadstone"
            echo "# macOS (Intel)"
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-darwin-amd64 -o treadstone && chmod +x treadstone"
            echo "# Linux"
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$VERSION/treadstone-linux-amd64 -o treadstone && chmod +x treadstone"
            echo '```'
            echo ""
            echo "> SHA-256 checksums available in \`checksums.txt\`."
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: artifacts/*
