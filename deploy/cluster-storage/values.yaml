enabled: true

storageClass:
  name: treadstone-workspace
  annotations: {}
  labels: {}
  provisioner: ""  # always overridden by values-<profile>.yaml (local / ack / aws)
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true
  parameters: {}

snapshotClass:
  enabled: false
  name: treadstone-workspace-snapshot
  annotations: {}
  labels: {}
  driver: ""
  # Retain keeps the provider snapshot if the K8s snapshot objects are removed unexpectedly.
  # Treadstone explicitly patches the bound VolumeSnapshotContent to Delete when a sandbox is
  # restored or deleted, so explicit sandbox cleanup still removes all snapshot assets.
  deletionPolicy: Retain
