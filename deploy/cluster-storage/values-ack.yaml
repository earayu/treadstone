storageClass:
  provisioner: diskplugin.csi.alibabacloud.com
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true
  parameters:
    type: cloud_essd
    performanceLevel: PL0
    fstype: ext4

snapshotClass:
  enabled: true
  driver: diskplugin.csi.alibabacloud.com
