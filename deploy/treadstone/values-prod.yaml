replicaCount: 2

image:
  repository: ghcr.io/earayu/treadstone
  tag: 0.9.3
  pullPolicy: Always

envSecretRef: treadstone-secrets

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

migration:
  enabled: true

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: treadstone
    # Wildcard *.treadstone-ai.dev must have the LOWEST priority so that
    # specific hosts (app., demo., etc.) in other Ingress resources win.
    alb.ingress.kubernetes.io/order: "100"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "true"
    alb.ingress.kubernetes.io/certificate-id: "24067085-cn-hangzhou"
    alb.ingress.kubernetes.io/healthcheck-enabled: "true"
    alb.ingress.kubernetes.io/healthcheck-method: GET
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-httpcode: http_2xx
  hosts:
    - host: api.treadstone-ai.dev
      paths:
        - path: /
          pathType: Prefix
    - host: "*.treadstone-ai.dev"
      paths:
        - path: /
          pathType: Prefix
