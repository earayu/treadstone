replicaCount: 1

image:
  repository: treadstone
  tag: latest
  pullPolicy: IfNotPresent

envSecretRef: treadstone-secrets

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

migration:
  enabled: true

hpa:
  enabled: false

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
