replicaCount: 1

image:
  repository: ghcr.io/earayu/treadstone
  tag: latest
  pullPolicy: Always

envSecretRef: treadstone-secrets

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

migration:
  enabled: true

hpa:
  enabled: false

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: demo.treadstone-ai.dev
      paths:
        - path: /
          pathType: Prefix
