[supervisord]
nodaemon=true
pidfile=%(ENV_XDG_RUNTIME_DIR)s/supervisord.pid
logfile=/dev/null
logfile_maxbytes=0
loglevel=info

[include]
files=/opt/gem/supervisord/*.conf

[unix_http_server]
file=%(ENV_XDG_RUNTIME_DIR)s/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix://%(ENV_XDG_RUNTIME_DIR)s/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
