replicaCount: 1

image:
  repository: ghcr.io/earayu/treadstone-web
  tag: latest
  pullPolicy: Always

backendUrl: http://treadstone-demo-treadstone:8000

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: treadstone
    # Exact host match — must have higher priority than the backend's
    # wildcard *.treadstone-ai.dev (order 100).
    alb.ingress.kubernetes.io/order: "3"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "true"
    alb.ingress.kubernetes.io/certificate-id: "24067085-cn-hangzhou"
    alb.ingress.kubernetes.io/healthcheck-enabled: "true"
    alb.ingress.kubernetes.io/healthcheck-method: GET
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-httpcode: http_2xx
  hosts:
    - host: app-demo.treadstone-ai.dev
      paths:
        - path: /
          pathType: Prefix
