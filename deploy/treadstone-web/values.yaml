replicaCount: 1

image:
  repository: ghcr.io/earayu/treadstone-web
  tag: latest
  pullPolicy: IfNotPresent

# Backend API service URL (K8s internal). nginx proxies /v1/* here.
# Override in env-specific values files (e.g. values-local.yaml, values-prod.yaml).
backendUrl: http://treadstone-server:8000

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []
