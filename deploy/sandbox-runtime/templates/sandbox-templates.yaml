{{- range .Values.sandboxTemplates }}
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" $ | nindent 4 }}
  annotations:
    display-name: {{ .displayName | quote }}
    description: {{ .description | quote }}
    {{- if .allowedStorageSizes }}
    treadstone-ai.dev/allowed-storage-sizes: {{ .allowedStorageSizes | join "," | quote }}
    {{- end }}
spec:
  podTemplate:
    {{- if and $.Values.acsScheduling.enabled $.Values.acsScheduling.podLabels }}
    metadata:
      labels:
        {{- range $k, $v := $.Values.acsScheduling.podLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    {{- end }}
    spec:
      {{- if and $.Values.acsScheduling.enabled $.Values.acsScheduling.podTolerations }}
      tolerations:
        {{- toYaml $.Values.acsScheduling.podTolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: sandbox
          image: {{ $.Values.image }}
          ports:
            - containerPort: {{ $.Values.containerPort }}
          readinessProbe:
            tcpSocket:
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .cpu.requests | quote }}
              memory: {{ .memory.requests | quote }}
            limits:
              cpu: {{ .cpu.limits | quote }}
              memory: {{ .memory.limits | quote }}
      restartPolicy: OnFailure
{{- end }}
