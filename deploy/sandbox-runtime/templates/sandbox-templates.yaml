{{- range .Values.sandboxTemplates }}
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" $ | nindent 4 }}
  annotations:
    display-name: {{ .displayName | quote }}
    description: {{ .description | quote }}
    {{- if .allowedStorageSizes }}
    treadstone-ai.dev/allowed-storage-sizes: {{ .allowedStorageSizes | join "," | quote }}
    {{- end }}
spec:
  podTemplate:
    metadata:
      labels:
        {{- range $k, $v := $.Values.sandboxPodSelectorLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        treadstone-ai.dev/provision-mode: "claim"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: sandbox
          image: {{ $.Values.image }}
          ports:
            - containerPort: {{ $.Values.containerPort }}
          {{- if $.Values.sandboxProbes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ $.Values.sandboxProbes.startup.path | quote }}
              port: {{ $.Values.containerPort }}
            periodSeconds: {{ $.Values.sandboxProbes.startup.periodSeconds }}
            timeoutSeconds: {{ $.Values.sandboxProbes.startup.timeoutSeconds }}
            failureThreshold: {{ $.Values.sandboxProbes.startup.failureThreshold }}
          {{- end }}
          {{- if $.Values.sandboxProbes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.sandboxProbes.readiness.path | quote }}
              port: {{ $.Values.containerPort }}
            periodSeconds: {{ $.Values.sandboxProbes.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.sandboxProbes.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.sandboxProbes.readiness.failureThreshold }}
          {{- end }}
          {{- if $.Values.sandboxProbes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.sandboxProbes.liveness.path | quote }}
              port: {{ $.Values.containerPort }}
            periodSeconds: {{ $.Values.sandboxProbes.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.sandboxProbes.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.sandboxProbes.liveness.failureThreshold }}
          {{- end }}
          resources:
            requests:
              cpu: {{ .cpu.requests | quote }}
              memory: {{ .memory.requests | quote }}
            limits:
              cpu: {{ .cpu.limits | quote }}
              memory: {{ .memory.limits | quote }}
      restartPolicy: OnFailure
{{- end }}
