apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.sandboxTemplate.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" . | nindent 4 }}
spec:
  podTemplate:
    spec:
      containers:
        - name: sandbox
          image: {{ .Values.sandboxTemplate.image }}
          ports:
            - containerPort: {{ .Values.sandboxTemplate.containerPort }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.sandboxTemplate.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.sandboxTemplate.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.sandboxTemplate.resources | nindent 12 }}
      restartPolicy: OnFailure
