{{- if .Values.router.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandbox-runtime.fullname" . }}-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sandbox-runtime.routerLabels" . | nindent 4 }}
{{- end }}
