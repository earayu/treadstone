{{- if .Values.router.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandbox-runtime.fullname" . }}-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicaCount }}
  selector:
    matchLabels:
      {{- include "sandbox-runtime.routerLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sandbox-runtime.routerLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: sandbox-router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          env:
            - name: PROXY_TIMEOUT_SECONDS
              value: "{{ .Values.router.proxyTimeoutSeconds | default 180 }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
{{- end }}
