{{- range .Values.sandboxTemplates }}
{{- if .warmPool.enabled }}
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ .name }}-pool
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" $ | nindent 4 }}
spec:
  replicas: {{ .warmPool.replicas }}
  sandboxTemplateRef:
    name: {{ .name }}
{{- end }}
{{- end }}
