{{- if .Values.warmPool.enabled }}
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ .Values.sandboxTemplate.name }}-pool
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox-runtime.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.warmPool.replicas }}
  sandboxTemplateRef:
    name: {{ .Values.sandboxTemplate.name }}
{{- end }}
