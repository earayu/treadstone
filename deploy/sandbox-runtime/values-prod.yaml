router:
  enabled: true
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

sandboxTemplate:
  name: treadstone-sandbox
  image: ghcr.io/agent-infra/sandbox:latest
  containerPort: 8080
  resources:
    requests:
      cpu: 500m
      memory: "1Gi"
      ephemeral-storage: "1Gi"

warmPool:
  enabled: true
  replicas: 3
