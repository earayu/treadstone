router:
  enabled: false
  replicaCount: 1
  image:
    repository: sandbox-router
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

sandboxTemplate:
  name: treadstone-sandbox
  image: ghcr.io/agent-infra/sandbox:latest
  containerPort: 8888
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 512Mi

warmPool:
  enabled: false
  replicas: 1
